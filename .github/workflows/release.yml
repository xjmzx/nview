name: Release

# Fires on any pushed tag starting with `v` (e.g. v0.1.0-beta.1) and can
# also be kicked off manually via the Actions tab. Builds the production web
# bundle and an Android APK, and publishes them to the GitHub Release.
#
# Android signing: if the repo has the keystore secrets set, this builds a
# *signed release* APK suitable for distribution. If they're absent (a fork,
# or before the keystore is uploaded) it falls back to a *debug* APK — fine to
# sideload for testing, not for the Play Store. Required secrets:
#   ANDROID_KEYSTORE_BASE64   base64 of the .jks  (base64 -w0 ndisc-view.jks)
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_ALIAS         key alias
#   ANDROID_KEY_PASSWORD      key password
# versionName is taken from the tag; versionCode from the workflow run number.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0-beta.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build web bundle + Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          # versionName is the tag without the leading "v".
          echo "version_name=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Detect Android signing secrets
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — falling back to a debug APK."
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode keystore
        if: steps.signing.outputs.available == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Build signed release APK
        if: steps.signing.outputs.available == 'true'
        working-directory: android
        env:
          NDISC_KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          NDISC_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          NDISC_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NDISC_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -PndiscVersionName="${{ steps.tag.outputs.version_name }}" \
            -PndiscVersionCode="${{ github.run_number }}"

      - name: Build debug APK (no signing secrets)
        if: steps.signing.outputs.available != 'true'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug \
            -PndiscVersionName="${{ steps.tag.outputs.version_name }}" \
            -PndiscVersionCode="${{ github.run_number }}"

      - name: Stage release artefacts
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          mkdir -p artefacts
          if [ "${{ steps.signing.outputs.available }}" = "true" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk \
               "artefacts/ndisc-view-${tag}-release.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk \
               "artefacts/ndisc-view-${tag}-debug.apk"
          fi
          (cd dist && zip -qr "../artefacts/ndisc-view-${tag}-web.zip" .)

      - name: Clean up keystore
        if: always()
        run: rm -f "${{ github.workspace }}/release.jks"

      # Publishes (or updates) the release with both artefacts. The
      # `prerelease` flag is auto-set from the tag: anything with a hyphen
      # (v0.1.0-beta.1) is a pre-release; plain vX.Y.Z is not.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            artefacts/*.apk
            artefacts/*.zip
